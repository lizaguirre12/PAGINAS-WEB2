<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>CURP - Solo Escudo</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="curp-card">
        
        <!-- Encabezado con ÚNICA imagen -->
        <header class="curp-header">
            <!-- Nota: Esta es la única imagen permitida en el documento -->
            <img https://www.seg.gob.mx/difusioneducativa/wp-content/uploads/sites/20/2020/09/escudo-nacional-oficial.png>
            <h1>ESTADOS UNIDOS MEXICANOS</h1>
            <h2>CONSTANCIA DE LA CLAVE ÚNICA DE REGISTRO DE POBLACIÓN</h2>
        </header>

        <!-- Cuerpo Central (Sin marcas de agua ni QR) -->
        <main class="curp-content">

            <div class="data-section">
                <div class="field">
                    <span class="label">Clave:</span>
                    <span class="value-large">JIAL080609MMCMGZA2</span>
                </div>
                <div class="field">
                    <span class="label">Nombre</span>
                    <span class="value">LIZETH JIMENEZ AGUIRRE</span>
                </div>
                <div class="field">
                    <span class="label">Entidad de registro:</span>
                    <span class="value-inline">MEXICO</span>
                </div>
            </div>

        </main>

        <!-- Pie de página (Solo texto, sin logos) -->
        <footer class="curp-footer">
            <div class="footer-text">
                CURP Certificada: verificada con el Registro Civil
            </div>
        </footer>
    </div>

</body>
</html>
