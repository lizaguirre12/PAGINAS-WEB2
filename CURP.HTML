<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>CURP - Lizeth Jimenez</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="curp-card">
        <header class="curp-header">
            <img src="CV/escudo-nacional.png" alt="Escudo Nacional" class="top-shield">
            <h1>ESTADOS UNIDOS MEXICANOS</h1>
            <h2>CONSTANCIA DE LA CLAVE ÚNICA DE REGISTRO DE POBLACIÓN</h2>
        </header>

        <main class="curp-content">
            <img src="CV/marca-agua.png" class="watermark" alt="">

            <div class="left-aside">
                <img src="CV/bandera-mexico.png" alt="Soy México" class="flag-img">
            </div>

            <div class="data-section">
                <div class="field">
                    <span class="label">Clave:</span>
                    <span class="value-large">JIAL080609MMCMGZA2</span>
                </div>
                <div class="field">
                    <span class="label">Nombre</span>
                    <span class="value">LIZETH JIMENEZ AGUIRRE</span>
                </div>
                <div class="field">
                    <span class="label">Entidad de registro:</span>
                    <span class="value-inline">MEXICO</span>
                </div>
            </div>

            <div class="right-aside">
                <img src="CV/qr-code.png" alt="QR" class="qr-code">
            </div>
        </main>

        <footer class="curp-footer">
            <img src="CV/logos-pie.png" alt="Logos institucionales" class="footer-logos">
            <div class="footer-text">
                CURP Certificada: verificada con el Registro Civil
            </div>
        </footer>
    </div>

</body>
</html>
